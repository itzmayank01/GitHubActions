name: Docker image build

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1

      - name: Login to DockerHub
        run: |
          echo ${{ secrets.DOCKERTOKEN }} | docker login -u "mayankthakur500123412" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t mayankthakur500123412/fastapi-app:v0.1 .

      - name: Push Docker Image
        run: |
          docker push mayankthakur500123412/fastapi-app:v0.1
